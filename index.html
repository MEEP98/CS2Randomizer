<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Challenge Generator</title>
<style>
body{margin:0;background:#121212;color:white;font-family:"Segoe UI",sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{position:relative;background:#1f1f1f;padding:25px;border-radius:12px;box-shadow:0 0 15px rgba(0,255,255,0.2);max-width:420px;width:90%;text-align:center;transition: background 0.3s;}
h1{margin-top:0;}
.challengeTitle{font-size:22px;font-weight:bold;margin-bottom:10px;}
.challengeText{font-size:18px;margin-bottom:20px;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition: transform 0.1s;}
button:hover{transform: scale(1.05);}
.primary{background:#00ffff;color:#111;}
.win{background:#28a745;color:white;}
.loss{background:#dc3545;color:white;}
.danger{background:#ff4c4c;color:white;}
.scoreboard{display:flex;gap:10px;margin-top:15px;}
.scoreBox{flex:1;padding:12px;border-radius:8px;text-align:center;font-weight:bold;transition: background 0.3s;}
.winBox{background:#1f5f2e;}
.lossBox{background:#5f1f1f;}
.scoreLabel{font-size:14px;opacity:0.8;}
.scoreNumber{font-size:22px;margin-top:4px;transition: transform 0.3s,color 0.3s;}

/* Blink animation */
@keyframes blinkGreen{0%{background:#1f1f1f;}50%{background:#1f5f2e;}100%{background:#1f1f1f;}}
@keyframes blinkRed{0%{background:#1f1f1f;}50%{background:#5f1f1f;}100%{background:#1f1f1f;}}
.blink-green{animation: blinkGreen 0.4s ease;}
.blink-red{animation: blinkRed 0.4s ease;}

/* Pop animation for score */
@keyframes pop{0%{transform:scale(1);color:white;}50%{transform:scale(1.5);color:yellow;}100%{transform:scale(1);color:white;}}
.pop{animation: pop 0.3s ease;}

/* Overlay popup */
#overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background: rgba(0,0,0,0.85);padding:20px;border-radius:10px;font-size:18px;font-weight:bold;z-index:1000;color:white;text-align:center;}
@media(max-width:420px){.challengeTitle{font-size:20px;}.challengeText{font-size:16px;}button{font-size:14px;padding:12px;}}
</style>
</head>
<body>
<div class="container">
<h1>CS2 Challenges</h1>
<div id="setup"></div>
<div id="game" style="display:none;">
<p><b>Mode:</b> <span id="modeDisplay"></span></p>
<p><b>Map:</b> <span id="mapDisplay"></span></p>
<p><b>Runde:</b> <span id="round"></span></p>
<p><b>Side:</b> <span id="side"></span></p>
<div id="challenge"></div>
<button class="win" onclick="win()">Vandt runde</button>
<button class="loss" onclick="lose()">Tabte runde</button>
<div class="scoreboard">
<div class="scoreBox winBox"><div class="scoreLabel">Wins</div><div id="wins" class="scoreNumber">0</div></div>
<div class="scoreBox lossBox"><div class="scoreLabel">Losses</div><div id="losses" class="scoreNumber">0</div></div>
</div>
<button class="danger" onclick="endGame()">Afslut kamp</button>
</div>
<div id="overlay"></div>
</div>

<script>
// ===== Variabler =====
let round=1, side="", overtime=false, wins=0, losses=0, currentMode="", currentMap="";
const mapsByMode={"Competitive":["Anubis","Overpass","Inferno","Mirage","Dust 2","Nuke","Ancient","Train","Vertigo","Office","Italy","Andet"],"Wingman":["Overpass","Vertigo","Nuke","Inferno","Andet"],"Druk":[]};
const weapons=["AK-47","M4A1-S","M4A4","AWP","Desert Eagle","MP9","P90","Nova","MAG-7","Galil","Famas","SSG 08"];
const generalChallenges=[{title:"Tag en slapper",text:"Du må kun liste denne runde."},{title:"Granatfest",text:"Brug alle dine granater inden 30 sek."},{title:"Camping tur",text:"Camp første hjørne du møder."},{title:"Ingen reload",text:"Reload kun når magasinet er tomt."},{title:"Blind tillid",text:"Følg en teammate hele runden."},{title:"Rush time",text:"Hold W hele vejen til sitet."},{title:"Headshot jæger",text:"Du må kun gå efter headshots."},{title:"Våbenbyt",text:"Samle første våben du ser på jorden."}];
const ctChallenges=[{title:"Bombens beskytter",text:"Du må ikke forlade sitet du starter på."},{title:"Hero defuse",text:"Hvis bomben plantes SKAL du forsøge defuse."}];
const tChallenges=[{title:"Entry fragger",text:"Du skal være første spiller ind på sitet."},{title:"Bomb carrier",text:"Du SKAL tage bomben hvis muligt."}];

// ===== Map-specifikke challenges =====
const competitiveMapChallenges={
"Anubis":[
  {title:"Mid Control",text:"Tag mid kontrol i starten af runden."},
  {title:"Fast B Rush",text:"Rush B site inden 30 sekunder."},
  {title:"Defuse Guard",text:"Forsvar bomben på site, selvom du ikke har kit."},
  {title:"Split Push",text:"Push A site fra to forskellige veje."},
  {title:"Lurk Connector",text:"Gå alene i connector for at fange rotater."},
  {title:"Sniper Angle",text:"Tag en sniper position på mid i starten."}
],
"Overpass":[
  {title:"Banana Push",text:"Kontroller Banana tidligt."},
  {title:"A Site Hold",text:"Forsvar A site hele runden."},
  {title:"Short Control",text:"Hold kortet mid uden at dø."},
  {title:"Lurk Mid",text:"Spil som lurker i mid og fang rotater."},
  {title:"Boost Play",text:"Boost en teammate på kortet for overraskelse."},
  {title:"Underpass Flank",text:"Sneak gennem underpass og fang fjender bag."}
],
"Inferno":[
  {title:"Rush Apartments",text:"Tag kontrollen over Apartments tidligt."},
  {title:"Banana Smoke",text:"Brug alle granater på Banana."},
  {title:"Pit Defense",text:"Hold pit uden at flytte dig."},
  {title:"Second Mid",text:"Kontroller anden mid zone med teammate."},
  {title:"Arch Peek",text:"Peek Arch uden at dø."},
  {title:"CT Spawn Lurk",text:"Lurk CT spawn og fang rotater."}
],
"Mirage":[
  {title:"Mid to B",text:"Push mid og roter hurtigt til B."},
  {title:"A Split",text:"Planlæg split push mod A site."},
  {title:"Underpass Lurk",text:"Lurk underpass og fang rotater."},
  {title:"Window Hold",text:"Hold window area uden at dø."},
  {title:"Jungle Control",text:"Kontroller Jungle til A site."},
  {title:"Connector Peek",text:"Peek connector og fang modstander på mid."}
],
"Dust 2":[
  {title:"Fast Long",text:"Push Long A hurtigt."},
  {title:"B Hold",text:"Forsvar B site med mindst 1 granat."},
  {title:"Mid Control",text:"Tag kontrol over Mid."},
  {title:"Catwalk Push",text:"Push Catwalk til A site."},
  {title:"Lower B Lurk",text:"Lurk Lower B og fang rotater."},
  {title:"Sniper Pit",text:"Hold pit med AWP uden at dø."}
],
"Nuke":[
  {title:"Ramp Control",text:"Tag ramp kontrol tidligt."},
  {title:"Vents Sneak",text:"Forsøg sneaky vent rotation."},
  {title:"Heaven Hold",text:"Hold Heaven uden at rotere."},
  {title:"Outside Control",text:"Tag kontrol over Outside området."},
  {title:"Secret Flank",text:"Sneak gennem Secret og fang modstander."},
  {title:"Lobby Peek",text:"Hold lobby angle uden at dø."}
],
"Ancient":[
  {title:"A Site Rush",text:"Rush A site uden døre."},
  {title:"B Stack",text:"Stack B site med teammate."},
  {title:"Mid Control",text:"Kontroller mid hele runden."},
  {title:"Flank Sneak",text:"Prøv at flank modstander via bagvejen."},
  {title:"Tree Lurk",text:"Lurk ved træerne og fang rotater."},
  {title:"Temple Hold",text:"Hold Temple uden at dø."}
],
"Train":[
  {title:"Popdog Control",text:"Tag kontrol over Popdog tidligt."},
  {title:"Inner Bombsite",text:"Hold Inner site hele runden."},
  {title:"Connector Push",text:"Push Connector til B site."},
  {title:"Sniper Lurk",text:"Tag sniper position og hold den."},
  {title:"T Ladder Sneak",text:"Sneak via T ladder uden at blive set."},
  {title:"Heaven Peak",text:"Hold Heaven area med granat."}
],
"Vertigo":[
  {title:"Ramp Rush",text:"Push Ramp uden at stoppe."},
  {title:"Roof Control",text:"Tag kontrol over Roof area."},
  {title:"Mid Hold",text:"Hold mid i starten af runden."},
  {title:"B Site Sneak",text:"Forsøg B site push via trapper."},
  {title:"Catwalk Lurk",text:"Lurk Catwalk og fang rotater."},
  {title:"Crane Angle",text:"Hold Crane angle og stop push."}
],
"Office":[
  {title:"Lobby Push",text:"Rush Lobby først."},
  {title:"Desk Camp",text:"Camp ved desk area."},
  {title:"Printer Lurk",text:"Lurk ved Printer og fang rotater."},
  {title:"Roof Hold",text:"Hold Roof området i starten."},
  {title:"Hallway Control",text:"Kontroller hallways mod A site."},
  {title:"Secret Peek",text:"Sneak gennem Secret til B."}
],
"Italy":[
  {title:"Middle Control",text:"Tag mid kontrol tidligt."},
  {title:"A Site Smoke",text:"Røg A site inden push."},
  {title:"B Lurk",text:"Lurk B site uden at engagere først."},
  {title:"Top Mid Control",text:"Hold top mid for rotater."},
  {title:"Arch Hold",text:"Hold Arch uden at dø."},
  {title:"Balcony Peek",text:"Kontroller Balcony for fjender."}
]
};
const wingmanMapChallenges={
"Overpass":[
  {title:"Short Push",text:"Push Short tidligt med teammate."},
  {title:"B Hold",text:"Forsvar B site uden rotation."},
  {title:"Connector Sneak",text:"Lurk Connector og fang rotater."},
  {title:"Banana Control",text:"Kontroller Banana tidligt i runden."},
  {title:"A Site Split",text:"Push A site fra mid og short samtidigt."}
],
"Vertigo":[
  {title:"Ramp Push",text:"Push Ramp tidligt."},
  {title:"B Site Hold",text:"Forsvar B site med granat."},
  {title:"Roof Peek",text:"Hold Roof og spot modstander."},
  {title:"Catwalk Lurk",text:"Lurk Catwalk og fang rotater."},
  {title:"Elevator Control",text:"Kontroller Elevator området hele runden."}
],
"Nuke":[
  {title:"Mini Ramp",text:"Tag mini-ramp kontrol."},
  {title:"Vents Lurk",text:"Lurk vents og fang rotater."},
  {title:"Outside Peek",text:"Hold Outside området uden at dø."},
  {title:"Silo Push",text:"Push Silo og kontrollér området."},
  {title:"Heaven Angle",text:"Hold Heaven area med granat."}
],
"Inferno":[
  {title:"Short Control",text:"Push Short til B site."},
  {title:"Banana Hold",text:"Forsvar Banana med granater."},
  {title:"Apartments Lurk",text:"Lurk Apartments for rotater."},
  {title:"Arch Peek",text:"Hold Arch for at stoppe push."},
  {title:"A Site Split",text:"Push A site fra mid og long samtidigt."}
]
};

// ===== Setup UI =====
function showSetup(){
  const setupDiv=document.getElementById("setup");
  setupDiv.innerHTML="<p>Vælg Game Mode</p>";
  ["Competitive","Wingman","Druk"].forEach(mode=>{
    const btn=document.createElement("button");
    btn.className="primary"; btn.innerText=mode; btn.onclick=()=>selectMode(mode);
    setupDiv.appendChild(btn);
  });
}

// ===== Game Flow =====
function selectMode(mode){
  currentMode=mode; document.getElementById("modeDisplay").innerText=mode;
  const setupDiv=document.getElementById("setup"); setupDiv.innerHTML="";
  if(mode==="Druk"){
    setupDiv.innerHTML="<p>Kommer snart</p>";
    const back=document.createElement("button"); back.className="danger"; back.innerText="Tilbage"; back.onclick=showSetup;
    setupDiv.appendChild(back); return;
  }
  setupDiv.innerHTML=`<p>Vælg Map (${mode})</p>`;
  mapsByMode[mode].forEach(map=>{
    const btn=document.createElement("button"); btn.className="primary"; btn.style.marginTop="10px"; btn.innerText=map; btn.onclick=()=>selectMap(map);
    setupDiv.appendChild(btn);
  });
  const backBtn=document.createElement("button"); backBtn.className="danger"; backBtn.innerText="Tilbage"; backBtn.style.marginTop="15px"; backBtn.onclick=showSetup;
  setupDiv.appendChild(backBtn);
}

function selectMap(map){
  currentMap=map; document.getElementById("mapDisplay").innerText=map;
  const setupDiv=document.getElementById("setup"); setupDiv.innerHTML=`<p>Valgt Mode: ${currentMode}</p><p>Valgt Map: ${currentMap}</p><p>Vælg start side</p>`;
  [["Start som Counter-Terrorist","CT"],["Start som Terrorist","T"]].forEach(([label,s])=>{
    const btn=document.createElement("button"); btn.className="primary"; btn.innerText=label; btn.onclick=()=>startGame(s); setupDiv.appendChild(btn);
  });
  const backBtn=document.createElement("button"); backBtn.className="danger"; backBtn.innerText="Tilbage"; backBtn.style.marginTop="15px"; backBtn.onclick=()=>selectMode(currentMode);
  setupDiv.appendChild(backBtn);
}

function randomWeapon(){return weapons[Math.floor(Math.random()*weapons.length)];}

function randomChallenge(){
  let pool=[...generalChallenges];
  if(side==="CT") pool.push(...ctChallenges);
  if(side==="T") pool.push(...tChallenges);
  if(currentMap && currentMap!=="Andet"){
    if(currentMode==="Competitive" && competitiveMapChallenges[currentMap]) pool.push(...competitiveMapChallenges[currentMap]);
    if(currentMode==="Wingman" && wingmanMapChallenges[currentMap]) pool.push(...wingmanMapChallenges[currentMap]);
  }
  let c=pool[Math.floor(Math.random()*pool.length)];
  if(Math.random()<0.25) return {title:"Våben Roulette", text:"Du må kun bruge "+randomWeapon()+" denne runde."};
  return c;
}

function startGame(s){ side=s; document.getElementById("setup").style.display="none"; document.getElementById("game").style.display="block"; updateUI();}
function updateUI(){ 
  document.getElementById("round").innerText=round; 
  document.getElementById("side").innerText=side==="CT"?"Counter-Terrorist":"Terrorist"; 
  const c=randomChallenge(); 
  const challengeDiv=document.getElementById("challenge"); 
  challengeDiv.innerHTML=`<div class='challengeTitle'></div><div class='challengeText'></div>`; 
  challengeDiv.querySelector(".challengeTitle").textContent=c.title; 
  challengeDiv.querySelector(".challengeText").textContent=c.text; 
}

// ===== Animations og overlay =====
function animateContainer(result){ const container=document.querySelector('.container'); container.classList.remove('blink-green','blink-red'); void container.offsetWidth; container.classList.add(result==='win'?'blink-green':'blink-red'); }
function animateScore(id){ const el=document.getElementById(id); el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
function showOverlay(message){ const overlay=document.getElementById('overlay'); overlay.textContent=message; overlay.style.display='block'; overlay.style.opacity=1; setTimeout(()=>{ overlay.style.transition='opacity 0.5s'; overlay.style.opacity=0; setTimeout(()=>overlay.style.display='none',500); },2000); }

// ===== Win/Loss Logic =====
function win(){ wins++; document.getElementById("wins").innerText=wins; animateContainer('win'); animateScore('wins'); checkWin(); nextRound();}
function lose(){ losses++; document.getElementById("losses").innerText=losses; animateContainer('loss'); animateScore('losses'); checkWin(); nextRound(); }

function checkWin(){
  const scoreMsg=(msg)=>showOverlay(msg);
  if(currentMode==="Competitive"){
    if(!overtime){
      if(wins===13 && losses<12){ scoreMsg("🎉 Du vandt kampen!"); location.reload();}
      if(losses===13 && wins<12){ scoreMsg("💀 Du tabte kampen!"); location.reload();}
      if(wins===12 && losses===12){ scoreMsg("⚔️ 12-12! Overtime starter!"); overtime=true;}
    }else{
      if(wins===16 && losses<15){ scoreMsg("🎉 Du vandt i overtime!"); location.reload();}
      if(losses===16 && wins<15){ scoreMsg("💀 Du tabte i overtime!"); location.reload();}
      if(wins===15 && losses===15){ scoreMsg("🤝 15-15! Kampen endte uafgjort."); location.reload();}
    }
  }else if(currentMode==="Wingman"){
    if(wins===9 && losses<9){ scoreMsg("🎉 Du vandt Wingman!"); location.reload();}
    if(losses===9 && wins<9){ scoreMsg("💀 Du tabte Wingman!"); location.reload();}
    if(wins===8 && losses===8){ scoreMsg("🤝 Wingman endte uafgjort 8-8"); location.reload();}
  }
}

function nextRound(){ 
  round++; 
  if(currentMode==="Competitive"){ 
    if(round===13 && !overtime || (overtime && round===28)){ side=side==="CT"?"T":"CT"; showOverlay(overtime?"Overtime sideskift!":"Siderne er skiftet!"); } 
  } else if(currentMode==="Wingman"){ 
    if(round===9){ side=side==="CT"?"T":"CT"; showOverlay("Siderne skifter i Wingman!"); } 
  } 
  updateUI();
}

function endGame(){ location.reload(); }

// ===== Init =====
showSetup();
</script>
</body>
</html>
