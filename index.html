```html
<script>

let round=1
let side=""
let wins=0
let losses=0
let currentMode=""
let currentMap=""

const mapsByMode={

Competitive:[
"Anubis","Overpass","Inferno","Mirage","Dust 2",
"Nuke","Ancient","Train","Vertigo","Office","Italy","Andet"
],

Wingman:[
"Overpass","Vertigo","Nuke","Inferno","Andet"
],

Druk:[]

}


// STANDARD CHALLENGES

const standardChallenges=[

{title:"Tag en slapper",text:"Du må kun liste denne runde"},
{title:"Rush B",text:"Du SKAL rush uden at stoppe"},
{title:"Ingen reload",text:"Reload kun når magasinet er helt tomt"},
{title:"Headshot only",text:"Du må kun skyde efter hovedet"},
{title:"Granatfest",text:"Brug alle dine granater inden 30 sek"}

]



// MAP CHALLENGES

const competitiveMapChallenges={
"Anubis":[{title:"Map Test",text:"Competitive Anubis virker"}],
"Overpass":[{title:"Map Test",text:"Competitive Overpass virker"}],
"Inferno":[{title:"Map Test",text:"Competitive Inferno virker"}],
"Mirage":[{title:"Map Test",text:"Competitive Mirage virker"}],
"Dust 2":[{title:"Map Test",text:"Competitive Dust2 virker"}],
"Nuke":[{title:"Map Test",text:"Competitive Nuke virker"}],
"Ancient":[{title:"Map Test",text:"Competitive Ancient virker"}],
"Train":[{title:"Map Test",text:"Competitive Train virker"}],
"Vertigo":[{title:"Map Test",text:"Competitive Vertigo virker"}],
"Office":[{title:"Map Test",text:"Competitive Office virker"}],
"Italy":[{title:"Map Test",text:"Competitive Italy virker"}],
"Andet":[{title:"Map Test",text:"Competitive Andet virker"}]
}

const wingmanMapChallenges={
"Overpass":[{title:"Map Test",text:"Wingman Overpass virker"}],
"Vertigo":[{title:"Map Test",text:"Wingman Vertigo virker"}],
"Nuke":[{title:"Map Test",text:"Wingman Nuke virker"}],
"Inferno":[{title:"Map Test",text:"Wingman Inferno virker"}],
"Andet":[{title:"Map Test",text:"Wingman Andet virker"}]
}



// GAME MODE

function selectMode(mode){

currentMode=mode

if(mode==="Druk"){

document.getElementById("setup").innerHTML=`
<p>Kommer snart</p>
<button class="danger" style="margin-top:15px;" onclick="resetSetup()">Tilbage</button>
`
return
}

let mapButtons=mapsByMode[mode].map(m=>`<button class="primary" onclick="selectMap('${m}')">${m}</button>`).join("")

document.getElementById("setup").innerHTML=`

<p>Vælg Map (${mode})</p>
${mapButtons}
<button class="danger" style="margin-top:15px;" onclick="resetSetup()">Tilbage</button>

`

}



function resetSetup(){

location.reload()

}



// MAP VALG

function selectMap(map){

currentMap=map

document.getElementById("setup").innerHTML=`

<p>Valgt Mode: ${currentMode}</p>
<p>Valgt Map: ${currentMap}</p>

<p>Vælg start side</p>

<button class="primary" onclick="startGame('CT')">Start som CT</button>
<button class="primary" onclick="startGame('T')">Start som T</button>

<button class="danger" style="margin-top:15px;" onclick="resetSetup()">Tilbage</button>

`

}



// RANDOM CHALLENGE

function randomChallenge(){

let useMapChallenge=Math.random()<0.5
let pool

if(useMapChallenge){

if(currentMode==="Competitive"){
pool=competitiveMapChallenges[currentMap]
}

if(currentMode==="Wingman"){
pool=wingmanMapChallenges[currentMap]
}

}

if(!pool || pool.length===0){
pool=standardChallenges
}

return pool[Math.floor(Math.random()*pool.length)]

}



// START GAME

function startGame(s){

side=s

document.getElementById("modeDisplay").innerText=currentMode
document.getElementById("mapDisplay").innerText=currentMap

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

updateUI()

}



// UI

function updateUI(){

document.getElementById("round").innerText=round
document.getElementById("side").innerText=side

let c=randomChallenge()

document.getElementById("challenge").innerHTML=`

<div class="challengeTitle">${c.title}</div>
<div class="challengeText">${c.text}</div>

`

}



// WIN / LOSE

function win(){

wins++
document.getElementById("wins").innerText=wins
nextRound()

}

function lose(){

losses++
document.getElementById("losses").innerText=losses
nextRound()

}



// NÆSTE RUNDE

function nextRound(){

round++


// SIDE SWITCH

if(currentMode==="Competitive" && round===13){
switchSide()
}

if(currentMode==="Wingman" && round===9){
switchSide()
}


// CHECK GAME END

if(currentMode==="Competitive" && wins===13){
alert("Kampen er slut! I vandt!")
location.reload()
}

if(currentMode==="Wingman"){

if(wins===9){
alert("Kampen er slut! I vandt!")
location.reload()
}

if(wins===8 && losses===8){
alert("Kampen endte 8-8 (uafgjort)")
location.reload()
}

}

updateUI()

}



function switchSide(){

side = side==="CT" ? "T" : "CT"
alert("Sides skifter!")

}



// END GAME

function endGame(){

location.reload()

}

</script>
```
