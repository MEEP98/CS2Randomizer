<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Challenge Generator</title>
<style>
body{margin:0;background:#121212;color:white;font-family:"Segoe UI",sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{position:relative;background:#1f1f1f;padding:25px;border-radius:12px;box-shadow:0 0 15px rgba(0,255,255,0.2);max-width:420px;width:90%;text-align:center;transition: background 0.3s;}
h1{margin-top:0;}
.challengeTitle{font-size:22px;font-weight:bold;margin-bottom:10px;}
.challengeText{font-size:18px;margin-bottom:20px;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition: transform 0.1s;}
button:hover{transform: scale(1.05);}
.primary{background:#00ffff;color:#111;}
.win{background:#28a745;color:white;}
.loss{background:#dc3545;color:white;}
.danger{background:#ff4c4c;color:white;}
.scoreboard{display:flex;gap:10px;margin-top:15px;}
.scoreBox{flex:1;padding:12px;border-radius:8px;text-align:center;font-weight:bold;transition: background 0.3s;}
.winBox{background:#1f5f2e;}
.lossBox{background:#5f1f1f;}
.scoreLabel{font-size:14px;opacity:0.8;}
.scoreNumber{font-size:22px;margin-top:4px;transition: transform 0.3s,color 0.3s;}
@keyframes blinkGreen{0%{background:#1f1f1f;}50%{background:#1f5f2e;}100%{background:#1f1f1f;}}
@keyframes blinkRed{0%{background:#1f1f1f;}50%{background:#5f1f1f;}100%{background:#1f1f1f;}}
.blink-green{animation: blinkGreen 0.4s ease;}
.blink-red{animation: blinkRed 0.4s ease;}
@keyframes pop{0%{transform:scale(1);color:white;}50%{transform:scale(1.5);color:yellow;}100%{transform:scale(1);color:white;}}
.pop{animation: pop 0.3s ease;}
#overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background: rgba(0,0,0,0.85);padding:20px;border-radius:10px;font-size:18px;font-weight:bold;z-index:1000;color:white;text-align:center;}
#overlay button{margin-top:15px;padding:10px 20px;font-size:16px;}
@media(max-width:420px){.challengeTitle{font-size:20px;}.challengeText{font-size:16px;}button{font-size:14px;padding:12px;}}

.ecoBox {display:flex;margin:10px 0;width:100%;height:50px;border-radius:8px;overflow:hidden;font-weight:bold;font-size:16px;cursor:default;}
.ecoBox div {flex:1;display:flex;justify-content:center;align-items:center;color:white;}
.ecoWin {background-color:#28a745;}
.ecoLoss {background-color:#dc3545;}
</style>
</head>
<body>

<div class="container">

<h1>CS2 Challenges</h1>

<div id="setup"></div>

<div id="game" style="display:none;">

<p><b>Mode:</b> <span id="modeDisplay"></span></p>
<p><b>Map:</b> <span id="mapDisplay"></span></p>
<p><b>Runde:</b> <span id="round"></span></p>
<p><b>Side:</b> <span id="side"></span></p>

<div id="challenge"></div>

<button class="win" onclick="win()">Vandt runde</button>
<button class="loss" onclick="lose()">Tabte runde</button>

<div class="ecoBox">
<div class="ecoWin">3250$</div>
<div class="ecoLoss">1400$</div>
</div>

<div class="scoreboard">
<div class="scoreBox winBox">
<div class="scoreLabel">Wins</div>
<div id="wins" class="scoreNumber">0</div>
</div>

<div class="scoreBox lossBox">
<div class="scoreLabel">Losses</div>
<div id="losses" class="scoreNumber">0</div>
</div>
</div>

<button class="danger" onclick="endGame()">Afslut kamp</button>

</div>

<div id="overlay"></div>

</div>

<script>

// ===== ORIGINAL VARIABLER =====

let round=1, side="", overtime=false, wins=0, losses=0, currentMode="", currentMap="";

const mapsByMode={
"Competitive":["Anubis","Overpass","Inferno","Mirage","Dust 2","Nuke","Ancient","Train","Vertigo","Office","Italy","Andet"],
"Wingman":["Overpass","Vertigo","Nuke","Inferno","Andet"],
"Druk":[]
};

const weaponsCT=["M4A1-S","M4A4","MP9","Famas","Nova","MAG-7","SSG 08","AWP","Desert Eagle","P90"];
const weaponsT=["AK-47","Galil","Nova","SSG 08","AWP","Desert Eagle","P90"];

// ===== NYT: CS PLAYER COLORS =====

const csPlayerColors=["Blå","Grøn","Gul","Orange","Lilla"];

function randomColor(){
return csPlayerColors[Math.floor(Math.random()*csPlayerColors.length)];
}

// ===== ORIGINAL CHALLENGES =====

const generalChallenges=[
{title:"Tag en slapper",text:"Du må kun liste denne runde."},
{title:"Granatfest",text:"Brug alle dine granater inden 30 sek."},
{title:"Camping tur",text:"Camp første hjørne du møder."},
{title:"Ingen reload",text:"Reload kun når magasinet er tomt."},
{title:"Blind tillid",text:"Følg en teammate hele runden."},
{title:"Rush time",text:"Hold W hele vejen til sitet."},
{title:"Headshot jæger",text:"Du må kun gå efter headshots."},
{title:"Våbenbyt",text:"Samle første våben du ser på jorden."},
{title:"Skylden",text:"{color} får skylden hvis runden tabes"}
];

const ctChallenges=[
{title:"Bombens beskytter",text:"Du må ikke forlade sitet du starter på."},
{title:"Hero defuse",text:"Hvis bomben plantes SKAL du forsøge defuse."}
];

const tChallenges=[
{title:"Entry fragger",text:"Du skal være første spiller ind på sitet."},
{title:"Bomb carrier",text:"Du SKAL tage bomben hvis muligt."}
];

// ===== NYT: DRUK CHALLENGES =====

const drinkChallenges=[

{title:"Entry død",text:"Dør du først → drik"},
{title:"Flash fail",text:"Flasher du en teammate → drik"},
{title:"Bomb drop",text:"Dropper du bomben → drik"},
{title:"Reload fail",text:"Reload mid fight → drik"},
{title:"Spray and pray",text:"Miss hele magasinet → drik"},
{title:"Rush B",text:"Sig rush B i voice"},
{title:"Eco gamble",text:"Kun pistol denne runde"},
{title:"SMG only",text:"Kun SMG denne runde"},
{title:"Shotgun gamer",text:"Kun shotgun denne runde"},
{title:"AWP gamble",text:"Miss første skud → drik"},
{title:"Utility master",text:"Brug alle grenades inden 30 sek"},
{title:"Silent round",text:"Du må ikke tale denne runde"},
{title:"Knife attempt",text:"Prøv knife kill"},
{title:"Camping trip",text:"Camp første hjørne du ser"},
{title:"Rush master",text:"Hold W hele vejen"},
{title:"Headshot hunter",text:"Kun headshots gælder"},
{title:"No reload",text:"Reload kun når tom"},
{title:"Trade master",text:"Du skal trade en teammate"},
{title:"Support player",text:"Flash en teammate ind"},
{title:"Clutch mode",text:"Hvis clutch fejler drikker {color}"}

];

// ===== NYT: FARVE EVENTS =====

const colorEvents=[
"{color} spiller drikker",
"{color} drikker 2 tårer",
"{color} får skylden og drikker",
"{color} tager næste straf",
"Alle drikker"
];

// ===== ØKONOMI =====

let ecoLossStreak=0;

function updateEconomy(){

const winCash=3250;
const baseLoss=1400;
const increment=500;
const maxLoss=3400;

let lossCash=baseLoss+(ecoLossStreak-1)*increment;

if(lossCash>maxLoss)lossCash=maxLoss;
if(lossCash<baseLoss)lossCash=baseLoss;

document.querySelector(".ecoWin").innerText=winCash+"$";
document.querySelector(".ecoLoss").innerText=lossCash+"$";

}

// ===== RANDOM CHALLENGE =====

function randomChallenge(){

// DRUK MODE

if(currentMode==="Druk"){

if(Math.random()<0.20){

let txt=colorEvents[Math.floor(Math.random()*colorEvents.length)];

return{
title:"🎨 FARVE EVENT",
text:txt.replace("{color}",randomColor())
};

}

let c=drinkChallenges[Math.floor(Math.random()*drinkChallenges.length)];

let text=c.text.replace("{color}",randomColor()).replace("{color}",randomColor());

return{title:c.title,text:text};

}

// ORIGINAL MODES

let pool=[...generalChallenges];

if(side==="CT")pool.push(...ctChallenges);
if(side==="T")pool.push(...tChallenges);

let c=pool[Math.floor(Math.random()*pool.length)];

let text=c.text.replace("{color}",randomColor()).replace("{color}",randomColor());

return{title:c.title,text:text};

}

// ===== RESTEN AF ORIGINAL SCRIPT =====

function showSetup(){
const setupDiv=document.getElementById("setup");
setupDiv.innerHTML="<p>Vælg Game Mode</p>";

["Competitive","Wingman","Druk"].forEach(mode=>{
const btn=document.createElement("button");
btn.className="primary";
btn.innerText=mode;
btn.onclick=()=>selectMode(mode);
setupDiv.appendChild(btn);
});
}

function selectMode(mode){

currentMode=mode;
document.getElementById("modeDisplay").innerText=mode;

const setupDiv=document.getElementById("setup");

setupDiv.innerHTML="";

if(mode==="Druk"){

setupDiv.innerHTML="<p>Druk mode klar 🍺</p>";

const start=document.createElement("button");
start.className="primary";
start.innerText="Start";
start.onclick=()=>startGame("T");
setupDiv.appendChild(start);

const back=document.createElement("button");
back.className="danger";
back.innerText="Tilbage";
back.onclick=showSetup;
setupDiv.appendChild(back);

return;
}

setupDiv.innerHTML=`<p>Vælg Map (${mode})</p>`;

mapsByMode[mode].forEach(map=>{

const btn=document.createElement("button");

btn.className="primary";
btn.style.marginTop="10px";
btn.innerText=map;
btn.onclick=()=>selectMap(map);

setupDiv.appendChild(btn);

});

}

function selectMap(map){

currentMap=map;

document.getElementById("mapDisplay").innerText=map;

const setupDiv=document.getElementById("setup");

setupDiv.innerHTML=`<p>Valgt Mode: ${currentMode}</p><p>Valgt Map: ${currentMap}</p><p>Vælg start side</p>`;

[["Start som Counter-Terrorist","CT"],["Start som Terrorist","T"]].forEach(([label,s])=>{

const btn=document.createElement("button");

btn.className="primary";
btn.innerText=label;
btn.onclick=()=>startGame(s);

setupDiv.appendChild(btn);

});

}

function startGame(s){

side=s;

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

updateUI();

}

function updateUI(){

document.getElementById("round").innerText=round;
document.getElementById("side").innerText=side==="CT"?"Counter-Terrorist":"Terrorist";

const c=randomChallenge();

const challengeDiv=document.getElementById("challenge");

challengeDiv.innerHTML=`<div class='challengeTitle'></div><div class='challengeText'></div>`;

challengeDiv.querySelector(".challengeTitle").textContent=c.title;
challengeDiv.querySelector(".challengeText").textContent=c.text;

}

showSetup();
updateEconomy();

</script>

</body>
</html>
