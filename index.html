<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CS2 Challenge Generator</title>

<style>

body{
margin:0;
background:#121212;
color:white;
font-family:Segoe UI, sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#1f1f1f;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,255,0.2);
max-width:420px;
width:90%;
text-align:center;
}

.challengeTitle{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.challengeText{
font-size:18px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#00ffff;color:#111;}
.win{background:#28a745;color:white;}
.loss{background:#dc3545;color:white;}
.danger{background:#ff4c4c;color:white;}

.scoreboard{
display:flex;
gap:10px;
margin-top:15px;
}

.scoreBox{
flex:1;
padding:12px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

.winBox{background:#1f5f2e;}
.lossBox{background:#5f1f1f;}

.scoreLabel{font-size:14px;opacity:0.8;}
.scoreNumber{font-size:22px;margin-top:4px;}

</style>

</head>

<body>

<div class="container">

<h1>CS2 Challenges</h1>

<div id="setup">

<p>Vælg start side</p>

<button class="primary" onclick="startGame('CT')">Start som Counter-Terrorist</button>
<button class="primary" onclick="startGame('T')">Start som Terrorist</button>

</div>

<div id="game" style="display:none;">

<p><b>Runde:</b> <span id="round"></span></p>
<p><b>Side:</b> <span id="side"></span></p>

<div id="challenge"></div>

<button class="win" onclick="win()">Vandt runde</button>
<button class="loss" onclick="lose()">Tabte runde</button>

<div class="scoreboard">

<div class="scoreBox winBox">
<div class="scoreLabel">Wins</div>
<div id="wins" class="scoreNumber">0</div>
</div>

<div class="scoreBox lossBox">
<div class="scoreLabel">Losses</div>
<div id="losses" class="scoreNumber">0</div>
</div>

</div>

<button class="danger" onclick="endGame()">Afslut kamp</button>

</div>

</div>

<script>

let round=1
let side=""
let overtime=false

let wins=0
let losses=0

const weapons=[
"AK-47","M4A1-S","M4A4","AWP","Desert Eagle",
"MP9","P90","Nova","MAG-7","Galil","Famas","SSG 08"
]

const generalChallenges=[

{title:"Tag en slapper",text:"Du må kun liste denne runde."},
{title:"Granatfest",text:"Brug alle dine granater inden 30 sek."},
{title:"Camping tur",text:"Camp første hjørne du møder."},
{title:"Ingen reload",text:"Reload kun når magasinet er tomt."},
{title:"Blind tillid",text:"Følg en teammate hele runden."},
{title:"Rush time",text:"Hold W hele vejen til sitet."},
{title:"Headshot jæger",text:"Du må kun gå efter headshots."},
{title:"Våbenbyt",text:"Samle første våben du ser på jorden."}

]

const ctChallenges=[
{title:"Bombens beskytter",text:"Du må ikke forlade sitet du starter på."},
{title:"Hero defuse",text:"Hvis bomben plantes SKAL du forsøge defuse."}
]

const tChallenges=[
{title:"Entry fragger",text:"Du skal være første spiller ind på sitet."},
{title:"Bomb carrier",text:"Du SKAL tage bomben hvis muligt."}
]

function randomWeapon(){
return weapons[Math.floor(Math.random()*weapons.length)]
}

function randomChallenge(){

let pool=[...generalChallenges]

if(side==="CT") pool.push(...ctChallenges)
if(side==="T") pool.push(...tChallenges)

let c=pool[Math.floor(Math.random()*pool.length)]

if(Math.random()<0.25){

return{
title:"Våben Roulette",
text:"Du må kun bruge "+randomWeapon()+" denne runde."
}

}

return c

}

function startGame(s){

side=s

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

updateUI()

}

function updateUI(){

document.getElementById("round").innerText=round
document.getElementById("side").innerText=side==="CT"?"Counter-Terrorist":"Terrorist"

let c=randomChallenge()

document.getElementById("challenge").innerHTML=
"<div class='challengeTitle'>"+c.title+"</div><div class='challengeText'>"+c.text+"</div>"

}

function checkWin(){

if(!overtime){

if(wins===13 && losses<12){

alert("🎉 Tillykke! Du vandt kampen!\nScore: "+wins+" - "+losses)
location.reload()

}

if(losses===13 && wins<12){

alert("💀 Du tabte kampen!\nScore: "+wins+" - "+losses)
location.reload()

}

if(wins===12 && losses===12){

alert("⚔️ 12-12! Overtime starter!")
overtime=true

}

}

else{

if(wins===16 && losses<15){

alert("🎉 Tillykke! Du vandt i overtime!\nScore: "+wins+" - "+losses)
location.reload()

}

if(losses===16 && wins<15){

alert("💀 Du tabte i overtime!\nScore: "+wins+" - "+losses)
location.reload()

}

if(wins===15 && losses===15){

alert("🤝 15-15! Kampen endte uafgjort.")
location.reload()

}

}

}

function nextRound(){

round++

if(round===13 && !overtime){

side=side==="CT"?"T":"CT"
alert("Siderne er skiftet!")

}

updateUI()

}

function win(){

wins++
document.getElementById("wins").innerText=wins

checkWin()

nextRound()

}

function lose(){

losses++
document.getElementById("losses").innerText=losses

checkWin()

nextRound()

}

function endGame(){

location.reload()

}

</script>

</body>
</html>
