<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Challenge Generator</title>
<style>
body {
    margin:0;
    background:#121212;
    color:white;
    font-family:"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container {
    position:relative;
    background:#1f1f1f;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
    max-width:420px;
    width:90%;
    text-align:center;
    transition: background 0.3s;
}
h1 { margin-top:0; }
.challengeTitle { font-size:22px; font-weight:bold; margin-bottom:10px; }
.challengeText { font-size:18px; margin-bottom:20px; }
button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition: transform 0.1s;
}
button:hover { transform: scale(1.05); }
.primary { background:#00ffff;color:#111; }
.win { background:#28a745;color:white; }
.loss { background:#dc3545;color:white; }
.danger { background:#ff4c4c;color:white; }
.scoreboard {
    display:flex;
    gap:10px;
    margin-top:15px;
}
.scoreBox {
    flex:1;
    padding:12px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
    transition: background 0.3s;
}
.winBox { background:#1f5f2e; }
.lossBox { background:#5f1f1f; }
.scoreLabel { font-size:14px; opacity:0.8; }
.scoreNumber { font-size:22px; margin-top:4px; transition: transform 0.3s,color 0.3s; }
@keyframes blinkGreen { 0%{background:#1f1f1f;}50%{background:#1f5f2e;}100%{background:#1f1f1f;} }
@keyframes blinkRed { 0%{background:#1f1f1f;}50%{background:#5f1f1f;}100%{background:#1f1f1f;} }
.blink-green { animation: blinkGreen 0.4s ease; }
.blink-red { animation: blinkRed 0.4s ease; }
@keyframes pop { 0%{transform:scale(1);color:white;}50%{transform:scale(1.5);color:yellow;}100%{transform:scale(1);color:white;} }
.pop { animation: pop 0.3s ease; }
#overlay {
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background: rgba(0,0,0,0.85);
    padding:20px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    z-index:1000;
    color:white;
    text-align:center;
}
#overlay button { margin-top:15px; padding:10px 20px; font-size:16px; }
@media(max-width:420px){
    .challengeTitle{font-size:20px;}
    .challengeText{font-size:16px;}
    button{font-size:14px;padding:12px;}
}
.ecoBox {
    display:flex;
    margin:10px 0;
    width:100%;
    height:50px;
    border-radius:8px;
    overflow:hidden;
    font-weight:bold;
    font-size:16px;
}
.ecoBox div {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}
.ecoWin { background-color:#28a745; }
.ecoLoss { background-color:#dc3545; }
</style>
</head>
<body>
<div class="container">
<h1>CS2 Challenges</h1>

<div id="setup"></div>

<div id="game" style="display:none;">
<p><b>Mode:</b> <span id="modeDisplay"></span></p>
<p><b>Map:</b> <span id="mapDisplay"></span></p>
<p><b>Runde:</b> <span id="round"></span></p>
<p><b>Side:</b> <span id="side"></span></p>
<div id="challenge"></div>

<button class="win" onclick="win()">Vandt runde</button>
<button class="loss" onclick="lose()">Tabte runde</button>

<div class="ecoBox">
  <div class="ecoWin">3250$</div>
  <div class="ecoLoss">1400$</div>
</div>

<div class="scoreboard">
  <div class="scoreBox winBox"><div class="scoreLabel">Wins</div><div id="wins" class="scoreNumber">0</div></div>
  <div class="scoreBox lossBox"><div class="scoreLabel">Losses</div><div id="losses" class="scoreNumber">0</div></div>
</div>

<button class="danger" onclick="endGame()">Afslut kamp</button>
</div>

<div id="overlay"></div>
</div>

<script>
// ===== GAME STATE =====
let round=1, side="", overtime=false, wins=0, losses=0, currentMode="", currentMap="";
let ecoLossStreak=0;
let gameOver=false;

// CS Farver
const csColors=["Blå","Grøn","Gul","Orange","Lilla"];
function randomColor(){ return csColors[Math.floor(Math.random()*csColors.length)]; }

// Maps & Våben
const mapsByMode={
  Competitive:["Anubis","Overpass","Inferno","Mirage","Dust 2","Nuke","Ancient","Train","Vertigo","Office","Italy","Andet"],
  Wingman:["Overpass","Vertigo","Nuke","Inferno","Andet"],
  Druk:[]
};
const weaponsCT=["M4A1-S","M4A4","MP9","Famas","Nova","MAG-7","SSG 08","AWP","Desert Eagle","P90"];
const weaponsT=["AK-47","Galil","Nova","SSG 08","AWP","Desert Eagle","P90"];

// Challenges
const generalChallenges=[
  {title:"Tag en slapper",text:"Du må kun liste denne runde."},
  {title:"Granatfest",text:"Brug alle dine granater inden 30 sek."},
  {title:"Camping tur",text:"Camp første hjørne du møder."},
  {title:"Ingen reload",text:"Reload kun når magasinet er tomt."},
  {title:"Blind tillid",text:"Følg en teammate hele runden."},
  {title:"Rush time",text:"Hold W hele vejen til sitet."},
  {title:"Headshot jæger",text:"Du må kun gå efter headshots."},
  {title:"Våbenbyt",text:"Samle første våben du ser på jorden."}
];
const ctChallenges=[
  {title:"Bombens beskytter",text:"Du må ikke forlade sitet du starter på."},
  {title:"Hero defuse",text:"Hvis bomben plantes SKAL du forsøge defuse."}
];
const tChallenges=[
  {title:"Entry fragger",text:"Du skal være første spiller ind på sitet."},
  {title:"Bomb carrier",text:"Du SKAL tage bomben hvis muligt."}
];
const competitiveMapChallenges={};
const wingmanMapChallenges={};

// DRUK Challenges
const drinkChallenges=[
  {title:"Entry død",text:"Dør du først → drik"},
  {title:"Flash fail",text:"Flasher du en teammate → drik"},
  {title:"Bomb drop",text:"Dropper du bomben → drik"},
  {title:"Reload fail",text:"Reload mid fight → drik"},
  {title:"Spray and pray",text:"Miss hele magasinet → drik"},
  {title:"Rush B",text:"Sig rush B i voice"},
  {title:"Camping trip",text:"Camp første hjørne"},
  {title:"Knife attempt",text:"Prøv knife kill"},
  {title:"Utility master",text:"Brug alle grenades"},
  {title:"Skylden",text:"{color} drikker"}
];
const colorEvents=["{color} drikker","{color} drikker 2 tårer","{color} tager straffen","Alle drikker"];

// ===== ØKONOMI =====
function updateEconomy(){
  if(currentMode==="Druk") return;
  let winCash=3250, baseLoss=1400, increment=500, maxLoss=3400;
  let lossCash=baseLoss+(ecoLossStreak-1)*increment;
  if(lossCash>maxLoss) lossCash=maxLoss;
  if(lossCash<baseLoss) lossCash=baseLoss;
  document.querySelector(".ecoWin").innerText=winCash+"$";
  document.querySelector(".ecoLoss").innerText=lossCash+"$";
}

// ===== SETUP UI =====
function showSetup(){
  const setup=document.getElementById("setup");
  setup.innerHTML="<p>Vælg Game Mode</p>";
  ["Competitive","Wingman","Druk"].forEach(mode=>{
    const btn=document.createElement("button"); 
    btn.className="primary"; 
    btn.innerText=mode; 
    btn.onclick=()=>selectMode(mode);
    setup.appendChild(btn);
  });
  // Fjernet afslut fra startmenu
}
