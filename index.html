<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Challenge Generator</title>
<style>
body{margin:0;background:#121212;color:white;font-family:"Segoe UI",sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{position:relative;background:#1f1f1f;padding:25px;border-radius:12px;box-shadow:0 0 15px rgba(0,255,255,0.2);max-width:420px;width:90%;text-align:center;transition: background 0.3s;}
h1{margin-top:0;}
.challengeTitle{font-size:22px;font-weight:bold;margin-bottom:10px;}
.challengeText{font-size:18px;margin-bottom:20px;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition: transform 0.1s;}
button:hover{transform: scale(1.05);}
.primary{background:#00ffff;color:#111;}
.win{background:#28a745;color:white;}
.loss{background:#dc3545;color:white;}
.danger{background:#ff4c4c;color:white;}
.scoreboard{display:flex;gap:10px;margin-top:15px;}
.scoreBox{flex:1;padding:12px;border-radius:8px;text-align:center;font-weight:bold;transition: background 0.3s;}
.winBox{background:#1f5f2e;}
.lossBox{background:#5f1f1f;}
.scoreLabel{font-size:14px;opacity:0.8;}
.scoreNumber{font-size:22px;margin-top:4px;transition: transform 0.3s,color 0.3s;}
@keyframes blinkGreen{0%{background:#1f1f1f;}50%{background:#1f5f2e;}100%{background:#1f1f1f;}}
@keyframes blinkRed{0%{background:#1f1f1f;}50%{background:#5f1f1f;}100%{background:#1f1f1f;}}
.blink-green{animation: blinkGreen 0.4s ease;}
.blink-red{animation: blinkRed 0.4s ease;}
@keyframes pop{0%{transform:scale(1);color:white;}50%{transform:scale(1.5);color:yellow;}100%{transform:scale(1);color:white;}}
.pop{animation: pop 0.3s ease;}
#overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background: rgba(0,0,0,0.85);padding:20px;border-radius:10px;font-size:18px;font-weight:bold;z-index:1000;color:white;text-align:center;}
#overlay button{margin-top:15px;padding:10px 20px;font-size:16px;}
@media(max-width:420px){.challengeTitle{font-size:20px;}.challengeText{font-size:16px;}button{font-size:14px;padding:12px;}}

/* ØKONOMI-BOKS CSS */
.ecoBox {display:flex;margin:10px 0;width:100%;height:50px;border-radius:8px;overflow:hidden;font-weight:bold;font-size:16px;cursor:default;}
.ecoBox div {flex:1;display:flex;justify-content:center;align-items:center;color:white;}
.ecoWin {background-color:#28a745;}
.ecoLoss {background-color:#dc3545;}
</style>
</head>
<body>
<div class="container">
<h1>CS2 Challenges</h1>
<div id="setup"></div>
<div id="game" style="display:none;">
<p><b>Mode:</b> <span id="modeDisplay"></span></p>
<p><b>Map:</b> <span id="mapDisplay"></span></p>
<p><b>Runde:</b> <span id="round"></span></p>
<p><b>Side:</b> <span id="side"></span></p>
<div id="challenge"></div>
<button class="win" onclick="win()">Vandt runde</button>
<button class="loss" onclick="lose()">Tabte runde</button>

<!-- Økonomi-boks -->
<div class="ecoBox">
  <div class="ecoWin">3250$</div>
  <div class="ecoLoss">1400$</div>
</div>

<div class="scoreboard">
<div class="scoreBox winBox"><div class="scoreLabel">Wins</div><div id="wins" class="scoreNumber">0</div></div>
<div class="scoreBox lossBox"><div class="scoreLabel">Losses</div><div id="losses" class="scoreNumber">0</div></div>
</div>
<button class="danger" onclick="endGame()">Afslut kamp</button>
</div>
<div id="overlay"></div>
</div>

<script>
// ===== Variabler =====
let round=1, side="", overtime=false, wins=0, losses=0, currentMode="", currentMap="";
const mapsByMode={"Competitive":["Anubis","Overpass","Inferno","Mirage","Dust 2","Nuke","Ancient","Train","Vertigo","Office","Italy","Andet"],"Wingman":["Overpass","Vertigo","Nuke","Inferno","Andet"],"Druk":[]};
const weaponsCT=["M4A1-S","M4A4","MP9","Famas","Nova","MAG-7","SSG 08","AWP","Desert Eagle","P90"];
const weaponsT=["AK-47","Galil","Nova","SSG 08","AWP","Desert Eagle","P90"];
const generalChallenges=[{title:"Tag en slapper",text:"Du må kun liste denne runde."},{title:"Granatfest",text:"Brug alle dine granater inden 30 sek."},{title:"Camping tur",text:"Camp første hjørne du møder."},{title:"Ingen reload",text:"Reload kun når magasinet er tomt."},{title:"Blind tillid",text:"Følg en teammate hele runden."},{title:"Rush time",text:"Hold W hele vejen til sitet."},{title:"Headshot jæger",text:"Du må kun gå efter headshots."},{title:"Våbenbyt",text:"Samle første våben du ser på jorden."}];
const ctChallenges=[{title:"Bombens beskytter",text:"Du må ikke forlade sitet du starter på."},{title:"Hero defuse",text:"Hvis bomben plantes SKAL du forsøge defuse."}];
const tChallenges=[{title:"Entry fragger",text:"Du skal være første spiller ind på sitet."},{title:"Bomb carrier",text:"Du SKAL tage bomben hvis muligt."}];
const competitiveMapChallenges={/* ... holdes uændret */};
const wingmanMapChallenges={/* ... holdes uændret */};

// ===== ØKONOMI =====
let ecoLossStreak=0;

// ===== GAME OVER FLAG =====
let gameOver=false;

// ===== Update Economy standard =====
function updateEconomy() {
  if(currentMode==="Druk") return;
  const winCash = 3250;
  const baseLoss = 1400;
  const increment = 500;
  const maxLoss = 3400;

  let lossCash = baseLoss + (ecoLossStreak - 1) * increment;
  if(lossCash > maxLoss) lossCash = maxLoss;
  if(lossCash < baseLoss) lossCash = baseLoss;

  document.querySelector(".ecoWin").innerText = winCash + "$";
  document.querySelector(".ecoLoss").innerText = lossCash + "$";
}

// ===== Setup UI =====
function showSetup(){
  const setupDiv=document.getElementById("setup");
  setupDiv.innerHTML="<p>Vælg Game Mode</p>";
  ["Competitive","Wingman","Druk"].forEach(mode=>{
    const btn=document.createElement("button");
    btn.className="primary"; btn.innerText=mode; btn.onclick=()=>selectMode(mode);
    setupDiv.appendChild(btn);
  });
}

// ===== Game Flow =====
function selectMode(mode){
  currentMode=mode; document.getElementById("modeDisplay").innerText=mode;
  const setupDiv=document.getElementById("setup"); setupDiv.innerHTML="";
  if(mode==="Druk"){
    setupDiv.innerHTML="<p>Druk mode 🍺</p>";
    const startBtn=document.createElement("button"); startBtn.className="primary"; startBtn.innerText="Start"; startBtn.onclick=()=>startGame("CT");
    setupDiv.appendChild(startBtn);
    const backBtn=document.createElement("button"); backBtn.className="danger"; backBtn.innerText="Tilbage"; backBtn.onclick=showSetup;
    setupDiv.appendChild(backBtn);
    return;
  }
  setupDiv.innerHTML=`<p>Vælg Map (${mode})</p>`;
  mapsByMode[mode].forEach(map=>{
    const btn=document.createElement("button"); btn.className="primary"; btn.style.marginTop="10px"; btn.innerText=map; btn.onclick=()=>selectMap(map);
    setupDiv.appendChild(btn);
  });
  const backBtn=document.createElement("button"); backBtn.className="danger"; backBtn.innerText="Tilbage"; backBtn.style.marginTop="15px"; backBtn.onclick=showSetup;
  setupDiv.appendChild(backBtn);
}

function selectMap(map){
  currentMap=map; document.getElementById("mapDisplay").innerText=map;
  const setupDiv=document.getElementById("setup"); setupDiv.innerHTML=`<p>Valgt Mode: ${currentMode}</p><p>Valgt Map: ${currentMap}</p><p>Vælg start side</p>`;
  [["Start som Counter-Terrorist","CT"],["Start som Terrorist","T"]].forEach(([label,s])=>{
    const btn=document.createElement("button"); btn.className="primary"; btn.innerText=label; btn.onclick=()=>startGame(s); setupDiv.appendChild(btn);
  });
  const backBtn=document.createElement("button"); backBtn.className="danger"; backBtn.innerText="Tilbage"; backBtn.style.marginTop="15px"; backBtn.onclick=()=>selectMode(currentMode);
  setupDiv.appendChild(backBtn);
}

// ===== Game functions =====
function randomWeapon(){ return (side==="CT" ? weaponsCT : weaponsT)[Math.floor(Math.random()*(side==="CT" ? weaponsCT.length : weaponsT.length))]; }
function randomChallenge(){
  let pool=[...generalChallenges];
  if(side==="CT") pool.push(...ctChallenges);
  if(side==="T") pool.push(...tChallenges);
  if(currentMap && currentMap!=="Andet"){
    if(currentMode==="Competitive" && competitiveMapChallenges[currentMap]) pool.push(...competitiveMapChallenges[currentMap]);
    if(currentMode==="Wingman" && wingmanMapChallenges[currentMap]) pool.push(...wingmanMapChallenges[currentMap]);
  }
  let c=pool[Math.floor(Math.random()*pool.length)];
  if(Math.random()<0.25) return {title:"Våben Roulette", text:"Du må kun bruge "+randomWeapon()+" denne runde."};
  return c;
}

function startGame(s){ 
  side=s; document.getElementById("setup").style.display="none"; document.getElementById("game").style.display="block"; 
  updateUI(); 
  gameOver=false; 
  document.querySelectorAll(".win, .loss").forEach(btn=>btn.disabled=false);
}

function updateUI(){ 
  document.getElementById("round").innerText=round; 
  document.getElementById("side").innerText=side==="CT"?"Counter-Terrorist":"Terrorist"; 
  const c=randomChallenge(); 
  const challengeDiv=document.getElementById("challenge"); 
  challengeDiv.innerHTML=`<div class='challengeTitle'></div><div class='challengeText'></div>`; 
  challengeDiv.querySelector(".challengeTitle").textContent=c.title; 
  challengeDiv.querySelector(".challengeText").textContent=c.text; 
}

// ===== Animations og overlay =====
function animateContainer(result){ const container=document.querySelector('.container'); container.classList.remove('blink-green','blink-red'); void container.offsetWidth; container.classList.add(result==='win'?'blink-green':'blink-red'); }
function animateScore(id){ const el=document.getElementById(id); el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }

function showOverlay(message, showButton=false){
  const overlay=document.getElementById('overlay');
  overlay.innerHTML=`<div>${message}</div>`;
  if(showButton){
    const btn=document.createElement("button");
    btn.className="primary";
    btn.innerText="Afslut";
    btn.onclick=resetGame;
    overlay.appendChild(btn);

    gameOver = true; 
    document.querySelectorAll(".win, .loss").forEach(btn=>btn.disabled=true);
  }
  overlay.style.display='block';
  overlay.style.opacity=1;
  if(!showButton){ setTimeout(()=>{ overlay.style.display='none'; },2000); }
}

// ===== Win/Loss Logic =====
function win(){
  if(gameOver) return;
  wins++; ecoLossStreak=0;
  document.getElementById("wins").innerText=wins;
  animateContainer('win'); animateScore('wins'); checkWin(); nextRound(); updateEconomy();
}

function lose(){
  if(gameOver) return;
  losses++; ecoLossStreak++;
  document.getElementById("losses").innerText=losses;
  animateContainer('loss'); animateScore('loss'); checkWin(); nextRound(); updateEconomy();
}

function checkWin(){
  const scoreMsg=(msg)=>showOverlay(msg,true);
  if(currentMode==="Competitive"){
    if(!overtime){
      if(wins===13 && losses<12){ scoreMsg("Tillykke du vandt 🎉"); return;}
      if(losses===13 && wins<12){ scoreMsg("Man kan ikke stoppe på et loss 💀"); return;}
      if(wins===12 && losses===12){ showOverlay("⚔️ 12-12! Overtime starter!"); overtime=true;}
    }else{
      if(wins===16 && losses<15){ scoreMsg("Tillykke du vandt 🎉"); return;}
      if(losses===16 && wins<15){ scoreMsg("Man kan ikke stoppe på et loss 💀"); return;}
      if(wins===15 && losses===15){ scoreMsg("Tæt på, godt kæmpet 🤝"); return;}
    }
  }else if(currentMode==="Wingman"){
    if(wins===9 && losses<9){ scoreMsg("Tillykke du vandt 🎉"); return;}
    if(losses===9 && wins<9){ scoreMsg("Man kan ikke stoppe på et loss 💀"); return;}
    if(wins===8 && losses===8){ scoreMsg("Tæt på, godt kæmpet 🤝"); return; }
  }
}

function nextRound(){
  round++;
  let sideChanged=false;
  if(currentMode==="Competitive"){
    if(round===13 && !overtime || (overtime && round===28)){ side=side==="CT"?"T":"CT"; showOverlay(overtime?"Overtime sideskift!":"Siderne er skiftet!"); sideChanged=true; }
  } else if(currentMode==="Wingman"){
    if(round===9){ side=side==="CT"?"T":"CT"; showOverlay("Siderne skifter i Wingman!"); sideChanged=true; }
  }
  if(sideChanged){ ecoLossStreak=0; }
  updateUI();
  updateEconomy();
}

function endGame(){ showOverlay("Kampen blev afsluttet.",true); }

// ===== Init =====
showSetup();
updateEconomy();
</script>
</body>
</html>
